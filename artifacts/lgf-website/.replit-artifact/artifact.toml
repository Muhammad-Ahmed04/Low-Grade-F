kind = "web"
previewPath = "/"
title = "Low Grade Films"
version = "1.0.0"
id = "artifacts/lgf-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18309

[services.development]
run = "pnpm --filter @workspace/lgf-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lgf-website", "run", "build" ]
publicDir = "artifacts/lgf-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18309"
BASE_PATH = "/"
